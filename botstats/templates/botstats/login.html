<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Stats — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0;
               display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        form { background: #1a1a1a; padding: 32px; border-radius: 8px; border: 1px solid #333;
               width: 320px; display: flex; flex-direction: column; gap: 14px; }
        h1 { text-align: center; font-size: 20px; }
        input { padding: 10px 14px; border-radius: 6px; border: 1px solid #444;
                background: #111; color: #e0e0e0; font-size: 14px; }
        input:focus { outline: none; border-color: #666; }
        button { padding: 10px; border-radius: 6px; border: none; background: #333;
                 color: #e0e0e0; font-size: 14px; cursor: pointer; }
        button:hover { background: #444; }
        .error { color: #e55; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <h1>Bot Stats</h1>
        <input type="password" name="password" placeholder="Password" autofocus>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <button type="submit">Login</button>
    </form>
</body>
</html>
