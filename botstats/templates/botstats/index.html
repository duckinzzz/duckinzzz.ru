<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Stats</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
        h1 { margin-bottom: 16px; }
        .filters { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        .filters a {
            padding: 6px 14px; border-radius: 6px; text-decoration: none;
            background: #1e1e1e; color: #ccc; border: 1px solid #333;
        }
        .filters a.active, .filters a:hover { background: #3a3a3a; color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; position: sticky; top: 0; }
        tr:hover { background: #1a1a1a; }
        pre { max-width: 500px; max-height: 120px; overflow: auto; white-space: pre-wrap; word-break: break-all;
              font-size: 12px; background: #111; padding: 6px; border-radius: 4px; }
        .empty { padding: 40px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <h1>Bot Stats</h1>

    <div class="filters">
        <a href="?" class="{% if not selected_bot %}active{% endif %}">All</a>
        {% for name in bot_names %}
            <a href="?bot_name={{ name|urlencode }}"
               class="{% if selected_bot == name %}active{% endif %}">{{ name }}</a>
        {% endfor %}
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Bot</th>
                <th>Payload</th>
                <th>Received</th>
            </tr>
        </thead>
        <tbody>
            {% for entry in entries %}
            <tr>
                <td>{{ entry.id }}</td>
                <td>{{ entry.bot_name }}</td>
                <td><pre>{{ entry.payload|pprint }}</pre></td>
                <td>{{ entry.created_at|date:"Y-m-d H:i:s" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="empty">No data yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
